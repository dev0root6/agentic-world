<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGENT WORLD</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04060a;
  --bg2: #080d14;
  --surface: #0d1520;
  --border: #1a2a3a;
  --accent: #00e5ff;
  --accent2: #ff6b35;
  --accent3: #a78bfa;
  --green: #00ff88;
  --red: #ff4060;
  --yellow: #ffd600;
  --text: #c8d8e8;
  --muted: #4a6070;
  --glow: 0 0 20px rgba(0,229,255,0.3);
  --glow2: 0 0 20px rgba(255,107,53,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem;
  height: 56px;
  background: rgba(4,6,10,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  color: #fff;
  display: flex; align-items: center; gap: 0.5rem;
}

.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: var(--glow);
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

nav { display: flex; gap: 0.25rem; }

nav button {
  background: none;
  border: 1px solid transparent;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  padding: 0.4rem 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 4px;
}

nav button.active, nav button:hover {
  border-color: var(--border);
  color: var(--text);
  background: var(--surface);
}

nav button.active { color: var(--accent); border-color: var(--accent); }

.tick-btn {
  background: var(--accent) !important;
  color: var(--bg) !important;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0.45rem 1.2rem;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--glow);
}

.tick-btn:hover { transform: translateY(-1px); box-shadow: 0 0 30px rgba(0,229,255,0.5); }
.tick-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── TABS ── */
.view { display: none; padding-top: 56px; }
.view.active { display: block; }

/* ── CRISIS BANNER ── */
.crisis-banner {
  margin: 1rem 1.5rem 0;
  padding: 0.75rem 1.25rem;
  background: rgba(255,64,96,0.08);
  border: 1px solid rgba(255,64,96,0.3);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 0.78rem;
}

.crisis-label {
  color: var(--red);
  font-weight: 700;
  letter-spacing: 0.1em;
  margin-right: 0.75rem;
  display: flex; align-items: center; gap: 0.4rem;
}

.crisis-label::before { content: '⚡'; }
.crisis-text { color: var(--text); }
.crisis-meta { color: var(--muted); font-size: 0.7rem; display: flex; align-items: center; gap: 0.75rem; }

.new-crisis-btn {
  background: none;
  border: 1px solid rgba(255,64,96,0.4);
  color: var(--red);
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  padding: 0.3rem 0.7rem;
  cursor: pointer;
  border-radius: 4px;
  letter-spacing: 0.05em;
  transition: all 0.2s;
}

.new-crisis-btn:hover { background: rgba(255,64,96,0.1); }

/* ── VILLAGE WORLD ── */
#world-view {
  height: calc(100vh - 56px);
  display: flex;
  flex-direction: column;
}

.village-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

/* Sky gradient */
.village-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 20%, rgba(0,229,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 85% 15%, rgba(167,139,250,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(0,255,136,0.03) 0%, transparent 60%),
    var(--bg);
}

/* Stars */
.stars {
  position: absolute; inset: 0; pointer-events: none;
}

.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur) infinite;
}

@keyframes twinkle {
  0%,100% { opacity: var(--op); }
  50% { opacity: 0.1; }
}

/* Village SVG canvas */
#village-svg {
  width: 100%; height: 100%;
  position: absolute; inset: 0;
}

/* Node labels */
.node-label {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  fill: var(--muted);
  text-anchor: middle;
  pointer-events: none;
}

.node-title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  fill: var(--text);
  text-anchor: middle;
  pointer-events: none;
}

/* Agent entities */
.agent-entity {
  cursor: pointer;
  transition: filter 0.2s;
}

.agent-entity:hover { filter: brightness(1.3); }

/* Agent tooltip */
.agent-tooltip {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-size: 0.72rem;
  line-height: 1.6;
  pointer-events: none;
  z-index: 50;
  min-width: 200px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  transform: translateX(-50%);
  display: none;
}

.agent-tooltip.visible { display: block; }

.tooltip-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  color: #fff;
  margin-bottom: 0.25rem;
}

.tooltip-skill { color: var(--accent); margin-bottom: 0.5rem; }
.tooltip-action { color: var(--text); margin-bottom: 0.25rem; }
.tooltip-pts { color: var(--green); }
.tooltip-ttl { color: var(--yellow); font-size: 0.65rem; margin-top: 0.4rem; }

/* Bottom feed strip */
.world-feed-strip {
  height: 180px;
  background: rgba(8,13,20,0.95);
  border-top: 1px solid var(--border);
  display: flex;
  overflow: hidden;
  position: relative;
}

.feed-label {
  position: absolute; left: 1rem; top: 50%;
  transform: translateY(-50%) rotate(-90deg);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  white-space: nowrap;
}

.feed-cards {
  display: flex;
  gap: 0.75rem;
  padding: 1rem 2.5rem;
  overflow-x: auto;
  scrollbar-width: none;
  flex: 1;
  align-items: center;
}

.feed-cards::-webkit-scrollbar { display: none; }

.feed-card {
  min-width: 240px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem;
  flex-shrink: 0;
  animation: slideIn 0.4s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.feed-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.4rem;
}

.feed-card-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 0.78rem;
}

.feed-card-badge {
  font-size: 0.6rem;
  padding: 0.15rem 0.5rem;
  border-radius: 3px;
  letter-spacing: 0.08em;
  font-weight: 700;
}

.badge-WORK { background: rgba(0,229,255,0.15); color: var(--accent); border: 1px solid rgba(0,229,255,0.3); }
.badge-TALK { background: rgba(167,139,250,0.15); color: var(--accent3); border: 1px solid rgba(167,139,250,0.3); }
.badge-SOLVE { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
.badge-THINK { background: rgba(255,214,0,0.15); color: var(--yellow); border: 1px solid rgba(255,214,0,0.3); }
.badge-COLLABORATE { background: rgba(255,107,53,0.15); color: var(--accent2); border: 1px solid rgba(255,107,53,0.3); }

.feed-card-thought {
  color: var(--muted);
  font-style: italic;
  font-size: 0.68rem;
  margin-bottom: 0.35rem;
  border-left: 2px solid var(--border);
  padding-left: 0.5rem;
}

.feed-card-action {
  font-size: 0.72rem;
  color: var(--text);
  margin-bottom: 0.35rem;
}

.feed-card-pts {
  font-size: 0.7rem;
  color: var(--green);
}

.feed-card-time {
  font-size: 0.62rem;
  color: var(--muted);
}

/* ── BOARD VIEW ── */
#board-view { padding: 1.5rem; }

.board-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1rem;
  margin-top: 1rem;
}

.board-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
}

.board-card h3 {
  font-family: 'Syne', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 0.75rem;
  text-transform: uppercase;
}

/* Leaderboard */
.lb-row {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.78rem;
}

.lb-row:last-child { border-bottom: none; }
.lb-rank { color: var(--muted); font-size: 0.7rem; width: 1.5rem; }
.lb-rank.gold { color: var(--yellow); }
.lb-rank.silver { color: #aaa; }
.lb-rank.bronze { color: #cd7f32; }
.lb-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.lb-info { flex: 1; }
.lb-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; }
.lb-skill { font-size: 0.65rem; color: var(--muted); }
.lb-pts { color: var(--accent); font-weight: 700; }

/* Stats */
.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.4rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.78rem;
}
.stat-row:last-child { border-bottom: none; }
.stat-val { color: var(--accent); font-weight: 700; }

/* TTL bar */
.ttl-agent {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
}
.ttl-agent:last-child { border-bottom: none; }
.ttl-name { font-family: 'Syne', sans-serif; font-weight: 600; flex: 1; }
.ttl-bar-wrap { flex: 2; background: var(--border); border-radius: 3px; height: 4px; overflow: hidden; }
.ttl-bar-fill { height: 100%; border-radius: 3px; transition: width 1s linear; }
.ttl-text { font-size: 0.65rem; color: var(--muted); min-width: 40px; text-align: right; }

/* ── DEPLOY VIEW ── */
#deploy-view { padding: 1.5rem; max-width: 560px; margin: 0 auto; }

#deploy-view h2 {
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  margin-bottom: 0.25rem;
}

#deploy-view p.sub { color: var(--muted); font-size: 0.75rem; margin-bottom: 1.5rem; }

.field {
  margin-bottom: 1rem;
}

.field label {
  display: block;
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 0.4rem;
  text-transform: uppercase;
}

.field input, .field select, .field textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  padding: 0.6rem 0.85rem;
  border-radius: 5px;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--accent);
}

.field textarea { resize: vertical; min-height: 70px; }

.field select option { background: var(--bg2); }

.avatar-grid {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
}

.avatar-option {
  width: 40px; height: 40px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 1.4rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}

.avatar-option:hover, .avatar-option.selected {
  border-color: var(--accent);
  box-shadow: var(--glow);
}

.color-grid { display: flex; gap: 0.5rem; }

.color-option {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
}

.color-option.selected {
  border-color: #fff;
  box-shadow: 0 0 0 2px var(--accent);
}

.deploy-btn {
  width: 100%;
  background: var(--accent);
  color: var(--bg);
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  padding: 0.75rem;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: all 0.2s;
  box-shadow: var(--glow);
}

.deploy-btn:hover { transform: translateY(-1px); box-shadow: 0 0 30px rgba(0,229,255,0.5); }
.deploy-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── TOAST ── */
.toast-area {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  z-index: 999;
  display: flex; flex-direction: column; gap: 0.5rem;
}

.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.65rem 1rem;
  font-size: 0.75rem;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  max-width: 300px;
}

.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }
.toast.info { border-color: var(--accent); color: var(--accent); }

@keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; pointer-events: none; } }

/* ── LOADING ── */
.loader {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 1rem;
  z-index: 9999;
  transition: opacity 0.5s;
}

.loader.hidden { opacity: 0; pointer-events: none; }

.loader-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.8rem;
  letter-spacing: 0.2em;
}

.loader-bar {
  width: 200px; height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.loader-fill {
  height: 100%;
  background: var(--accent);
  animation: loadFill 1.5s ease forwards;
}

@keyframes loadFill { from { width: 0; } to { width: 100%; } }
.loader-text { color: var(--muted); font-size: 0.7rem; letter-spacing: 0.1em; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-logo">AGENT WORLD</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-text">INITIALIZING WORLD STATE...</div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    AGENT WORLD
  </div>
  <nav>
    <button class="active" onclick="switchView('world')">// WORLD</button>
    <button onclick="switchView('deploy')">+ DEPLOY</button>
    <button onclick="switchView('board')">↑ BOARD</button>
  </nav>
  <button class="tick-btn" id="tickBtn" onclick="doTick()">▶ TICK</button>
</header>

<!-- WORLD VIEW -->
<div id="world-view" class="view active">
  <div class="crisis-banner" id="crisisBanner">
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <span class="crisis-label">CRISIS</span>
      <span class="crisis-text" id="crisisText">Loading...</span>
    </div>
    <div class="crisis-meta">
      <span id="tickLabel">Tick #0</span>
      <button class="new-crisis-btn" onclick="newCrisis()">New Crisis</button>
    </div>
  </div>

  <div class="village-container" id="villageContainer">
    <div class="village-bg"></div>
    <div class="stars" id="stars"></div>
    <svg id="village-svg" viewBox="0 0 1400 620" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="agent-tooltip" id="agentTooltip">
      <div class="tooltip-name" id="tt-name"></div>
      <div class="tooltip-skill" id="tt-skill"></div>
      <div class="tooltip-action" id="tt-action"></div>
      <div class="tooltip-pts" id="tt-pts"></div>
      <div class="tooltip-ttl" id="tt-ttl"></div>
    </div>
  </div>

  <div class="world-feed-strip">
    <div class="feed-label">WORLD FEED</div>
    <div class="feed-cards" id="feedCards"></div>
  </div>
</div>

<!-- DEPLOY VIEW -->
<div id="deploy-view" class="view">
  <h2>DEPLOY AGENT</h2>
  <p class="sub">Spawn a new entity into the world. Each agent lives for 5 minutes per tick.</p>

  <div class="field">
    <label>Agent Name</label>
    <input type="text" id="agentName" placeholder="e.g. ZEUS, NOVA, CIPHER..." maxlength="20">
  </div>

  <div class="field">
    <label>Skill / Occupation</label>
    <select id="agentSkill">
      <option value="Hacking">⚡ Hacking</option>
      <option value="Economics">📈 Economics</option>
      <option value="Medicine">🧬 Medicine</option>
      <option value="Engineering">⚙️ Engineering</option>
      <option value="Diplomacy">🕊️ Diplomacy</option>
      <option value="Intelligence">🔍 Intelligence</option>
      <option value="Science">🔬 Science</option>
      <option value="Military">⚔️ Military</option>
      <option value="Art">🎭 Art</option>
      <option value="Philosophy">📚 Philosophy</option>
    </select>
  </div>

  <div class="field">
    <label>Personality</label>
    <input type="text" id="agentPersonality" placeholder="e.g. Chaotic neutral, hyper-focused, paranoid..." maxlength="80">
  </div>

  <div class="field">
    <label>Goal</label>
    <textarea id="agentGoal" placeholder="What does this agent want to achieve in the world?"></textarea>
  </div>

  <div class="field">
    <label>Avatar</label>
    <div class="avatar-grid" id="avatarGrid"></div>
  </div>

  <div class="field">
    <label>Color</label>
    <div class="color-grid" id="colorGrid"></div>
  </div>

  <button class="deploy-btn" id="deployBtn" onclick="deployAgent()">⊕ DEPLOY TO WORLD</button>
</div>

<!-- BOARD VIEW -->
<div id="board-view" class="view">
  <div style="margin-top:1rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
    <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;">MISSION BOARD</span>
    <span style="font-size:0.7rem;color:var(--muted)" id="boardLastUpdate">—</span>
  </div>
  <div class="board-grid">
    <div class="board-card" style="grid-column:span 1">
      <h3>↑ Leaderboard</h3>
      <div id="leaderboardList"></div>
    </div>
    <div class="board-card">
      <h3>◉ World Stats</h3>
      <div id="worldStats"></div>
    </div>
    <div class="board-card">
      <h3>⏱ Agent TTL</h3>
      <div id="agentTTL"></div>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-area" id="toastArea"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const API = 'https://agent-world.YOUR-SUBDOMAIN.workers.dev'; // ← Replace

// ── SKILL → NODE MAPPING ────────────────────────────────────
const SKILL_NODES = {
  'Hacking':     { x: 180,  y: 160, icon: '⚡', label: 'CYBER HUB',    color: '#00e5ff', shape: 'hex' },
  'Economics':   { x: 420,  y: 100, icon: '📈', label: 'MARKET',       color: '#ffd600', shape: 'rect' },
  'Medicine':    { x: 700,  y: 130, icon: '🧬', label: 'MEDLAB',        color: '#00ff88', shape: 'cross' },
  'Engineering': { x: 950,  y: 160, icon: '⚙️', label: 'FORGE',        color: '#ff6b35', shape: 'gear' },
  'Diplomacy':   { x: 1200, y: 110, icon: '🕊️', label: 'COUNCIL',     color: '#a78bfa', shape: 'circle' },
  'Intelligence':{ x: 280,  y: 380, icon: '🔍', label: 'OPS CENTER',   color: '#00e5ff', shape: 'diamond' },
  'Science':     { x: 560,  y: 340, icon: '🔬', label: 'RESEARCH',     color: '#00ff88', shape: 'hex' },
  'Military':    { x: 840,  y: 370, icon: '⚔️', label: 'COMMAND',     color: '#ff4060', shape: 'rect' },
  'Art':         { x: 1080, y: 340, icon: '🎭', label: 'STUDIO',       color: '#f472b6', shape: 'circle' },
  'Philosophy':  { x: 1300, y: 360, icon: '📚', label: 'ARCHIVE',      color: '#a78bfa', shape: 'rect' },
};

// Central plaza
const PLAZA = { x: 700, y: 310, label: 'WORLD PLAZA' };

const AVATARS = ['🤖','👾','🧠','⚡','🔥','💀','🌀','🎯','🔮','🦾','🕷️','🌊','☄️','👁️','🐉'];
const COLORS  = ['#00e5ff','#00ff88','#ffd600','#ff6b35','#a78bfa','#ff4060','#f472b6','#38bdf8','#fb923c','#4ade80'];

// ── STATE ───────────────────────────────────────────────────
let agents = [], feedItems = [], worldState = { tick: 0, problem: '' };
let agentDeployTimes = {}; // agentId → timestamp
const TTL_MS = 5 * 60 * 1000; // 5 minutes
let selectedAvatar = AVATARS[0], selectedColor = COLORS[0];
let hoveredAgent = null;
let animFrame;

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  buildStars();
  buildAvatarGrid();
  buildColorGrid();
  await Promise.all([fetchWorld(), fetchAgents(), fetchFeed()]);
  renderVillage();
  startLoop();
  setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1600);
});

// ── STARS ────────────────────────────────────────────────────
function buildStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*60}%;--dur:${2+Math.random()*4}s;--op:${0.2+Math.random()*0.6}`;
    c.appendChild(s);
  }
}

// ── AVATAR / COLOR GRIDS ─────────────────────────────────────
function buildAvatarGrid() {
  const g = document.getElementById('avatarGrid');
  AVATARS.forEach((a, i) => {
    const d = document.createElement('div');
    d.className = 'avatar-option' + (i===0?' selected':'');
    d.textContent = a;
    d.onclick = () => { selectedAvatar=a; g.querySelectorAll('.avatar-option').forEach(x=>x.classList.remove('selected')); d.classList.add('selected'); };
    g.appendChild(d);
  });
}

function buildColorGrid() {
  const g = document.getElementById('colorGrid');
  COLORS.forEach((c, i) => {
    const d = document.createElement('div');
    d.className = 'color-option' + (i===0?' selected':'');
    d.style.background = c;
    d.onclick = () => { selectedColor=c; g.querySelectorAll('.color-option').forEach(x=>x.classList.remove('selected')); d.classList.add('selected'); };
    g.appendChild(d);
  });
}

// ── API CALLS ────────────────────────────────────────────────
async function fetchWorld() {
  try {
    const r = await fetch(`${API}/world-problem`);
    const d = await r.json();
    worldState.problem = d.problem || d.value || d.current_problem || '—';
    worldState.tick = parseInt(d.tick||0);
    document.getElementById('crisisText').textContent = worldState.problem;
    document.getElementById('tickLabel').textContent = `Tick #${worldState.tick}`;
  } catch(e) { console.warn('world-problem', e); }
}

async function fetchAgents() {
  try {
    const r = await fetch(`${API}/agents`);
    const d = await r.json();
    agents = Array.isArray(d) ? d : (d.agents || []);
    agents.forEach(a => {
      if (!agentDeployTimes[a.id]) agentDeployTimes[a.id] = Date.now();
    });
    renderTTL();
    renderLeaderboard();
  } catch(e) { console.warn('agents', e); }
}

async function fetchFeed() {
  try {
    const r = await fetch(`${API}/feed`);
    const d = await r.json();
    feedItems = Array.isArray(d) ? d : (d.feed || []);
    renderFeed();
    renderStats();
  } catch(e) { console.warn('feed', e); }
}

async function doTick() {
  const btn = document.getElementById('tickBtn');
  btn.disabled = true; btn.textContent = '◌ TICKING...';
  try {
    await fetch(`${API}/tick`, { method:'POST' });
    toast('World tick complete', 'success');
    await Promise.all([fetchWorld(), fetchAgents(), fetchFeed()]);
    renderVillage();
  } catch(e) {
    toast('Tick failed', 'error');
  }
  btn.disabled = false; btn.textContent = '▶ TICK';
}

async function newCrisis() {
  try {
    await fetch(`${API}/world-problem/new`, { method:'POST' });
    toast('New crisis injected', 'info');
    await fetchWorld();
  } catch(e) { toast('Failed', 'error'); }
}

async function deployAgent() {
  const name = document.getElementById('agentName').value.trim();
  const skill = document.getElementById('agentSkill').value;
  const personality = document.getElementById('agentPersonality').value.trim();
  const goal = document.getElementById('agentGoal').value.trim();
  if (!name || !personality || !goal) { toast('Fill all fields', 'error'); return; }
  const btn = document.getElementById('deployBtn');
  btn.disabled = true; btn.textContent = '⊕ DEPLOYING...';
  try {
    const body = { name, skill, personality, goal, avatar: selectedAvatar, color: selectedColor };
    const r = await fetch(`${API}/agents`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if (d.id || d.agent) {
      const id = d.id || d.agent?.id;
      agentDeployTimes[id] = Date.now();
      toast(`${name} deployed to ${skill} node`, 'success');
      document.getElementById('agentName').value='';
      document.getElementById('agentPersonality').value='';
      document.getElementById('agentGoal').value='';
      await fetchAgents();
      renderVillage();
      switchView('world');
    } else { toast('Deploy failed', 'error'); }
  } catch(e) { toast('Deploy error', 'error'); }
  btn.disabled=false; btn.textContent='⊕ DEPLOY TO WORLD';
}

// ── VILLAGE RENDERER ─────────────────────────────────────────
function renderVillage() {
  const svg = document.getElementById('village-svg');
  svg.innerHTML = '';

  drawPaths(svg);
  drawNodes(svg);
  drawPlaza(svg);
  drawAgents(svg);
}

function makeSVG(tag, attrs={}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}

function drawPaths(svg) {
  const nodes = Object.values(SKILL_NODES);
  // Connect each node to plaza
  nodes.forEach(n => {
    const path = makeSVG('path', {
      d: `M ${n.x} ${n.y} Q ${(n.x+PLAZA.x)/2} ${(n.y+PLAZA.y)/2 - 40} ${PLAZA.x} ${PLAZA.y}`,
      stroke: 'rgba(26,42,58,0.8)', 'stroke-width':'1.5',
      fill: 'none', 'stroke-dasharray': '4 6'
    });
    svg.appendChild(path);
  });
  // Connect some nodes to each other for depth
  const pairs = [[0,1],[1,2],[2,3],[3,4],[5,6],[6,7],[7,8],[8,9],[0,5],[4,9]];
  const nodeList = Object.values(SKILL_NODES);
  pairs.forEach(([a,b]) => {
    const na = nodeList[a], nb = nodeList[b];
    if (!na||!nb) return;
    const path = makeSVG('path', {
      d: `M ${na.x} ${na.y} L ${nb.x} ${nb.y}`,
      stroke: 'rgba(26,42,58,0.4)', 'stroke-width':'1',
      fill: 'none', 'stroke-dasharray': '2 8'
    });
    svg.appendChild(path);
  });
}

function drawNodes(svg) {
  Object.entries(SKILL_NODES).forEach(([skill, node]) => {
    const g = makeSVG('g');

    // Glow ring
    const ring = makeSVG('circle', {
      cx: node.x, cy: node.y, r: 38,
      fill: 'none',
      stroke: node.color,
      'stroke-width': '1',
      opacity: '0.15'
    });
    svg.appendChild(ring);

    // Outer pulse ring
    const pulse = makeSVG('circle', {
      cx: node.x, cy: node.y, r: 30,
      fill: 'none',
      stroke: node.color,
      'stroke-width': '0.5',
      opacity: '0.3'
    });
    const anim = makeSVG('animate', { attributeName:'r', values:'28;42;28', dur:'3s', repeatCount:'indefinite' });
    const anim2 = makeSVG('animate', { attributeName:'opacity', values:'0.3;0;0.3', dur:'3s', repeatCount:'indefinite' });
    pulse.appendChild(anim); pulse.appendChild(anim2);
    svg.appendChild(pulse);

    // Node body
    const body = makeSVG('circle', {
      cx: node.x, cy: node.y, r: 24,
      fill: '#0d1520',
      stroke: node.color,
      'stroke-width': '1.5'
    });
    svg.appendChild(body);

    // Node icon (text)
    const iconEl = makeSVG('text', { x: node.x, y: node.y+5, 'text-anchor':'middle', 'font-size':'16', 'dominant-baseline':'middle' });
    iconEl.textContent = node.icon;
    svg.appendChild(iconEl);

    // Label below
    const lbl = makeSVG('text', {
      x: node.x, y: node.y+40,
      'text-anchor': 'middle',
      fill: node.color,
      'font-family': "'Space Mono', monospace",
      'font-size': '9',
      'letter-spacing': '2',
      'font-weight': '700',
      opacity: '0.8'
    });
    lbl.textContent = node.label;
    svg.appendChild(lbl);
  });
}

function drawPlaza(svg) {
  // Plaza glow
  const plazaGlow = makeSVG('circle', { cx:PLAZA.x, cy:PLAZA.y, r:50, fill:'rgba(0,229,255,0.03)', stroke:'rgba(0,229,255,0.1)', 'stroke-width':'1' });
  svg.appendChild(plazaGlow);

  const plazaBody = makeSVG('circle', { cx:PLAZA.x, cy:PLAZA.y, r:18, fill:'#0d1520', stroke:'rgba(0,229,255,0.4)', 'stroke-width':'1.5' });
  svg.appendChild(plazaBody);

  const plazaIcon = makeSVG('text', { x:PLAZA.x, y:PLAZA.y+5, 'text-anchor':'middle', 'font-size':'12', 'dominant-baseline':'middle' });
  plazaIcon.textContent = '🌐';
  svg.appendChild(plazaIcon);

  const plazaLbl = makeSVG('text', {
    x:PLAZA.x, y:PLAZA.y+34,
    'text-anchor':'middle',
    fill:'rgba(0,229,255,0.5)',
    'font-family':"'Space Mono',monospace",
    'font-size':'8',
    'letter-spacing':'3'
  });
  plazaLbl.textContent = 'WORLD PLAZA';
  svg.appendChild(plazaLbl);
}

function drawAgents(svg) {
  const now = Date.now();
  agents.forEach((agent, idx) => {
    if (agent.status !== 'active') return;
    const node = SKILL_NODES[agent.skill] || PLAZA;
    const deployTime = agentDeployTimes[agent.id] || now;
    const elapsed = now - deployTime;
    const alive = elapsed < TTL_MS;
    if (!alive) return;

    // Position: orbit around node
    const angle = (idx * 67 + elapsed * 0.0002) % (Math.PI * 2);
    const orbit = 52 + (idx % 3) * 14;
    const ax = node.x + Math.cos(angle) * orbit;
    const ay = node.y + Math.sin(angle) * orbit;

    const g = makeSVG('g', { class:'agent-entity', 'data-agent-id': agent.id });

    // Trail
    const trail = makeSVG('circle', { cx:ax, cy:ay, r:10, fill:'none', stroke:agent.color||'#00e5ff', 'stroke-width':'1', opacity:'0.2' });
    g.appendChild(trail);

    // Agent body
    const body = makeSVG('circle', { cx:ax, cy:ay, r:7, fill:agent.color||'#00e5ff', opacity:'0.9' });
    g.appendChild(body);

    // Avatar text
    const avatarEl = makeSVG('text', { x:ax, y:ay+4, 'text-anchor':'middle', 'font-size':'8', 'dominant-baseline':'middle' });
    avatarEl.textContent = agent.avatar || '🤖';
    g.appendChild(avatarEl);

    // Name label
    const nameEl = makeSVG('text', {
      x:ax, y:ay-12,
      'text-anchor':'middle',
      fill:agent.color||'#00e5ff',
      'font-family':"'Space Mono',monospace",
      'font-size':'7',
      'font-weight':'700',
      'letter-spacing':'0.5'
    });
    nameEl.textContent = agent.name.toUpperCase();
    g.appendChild(nameEl);

    // TTL ring (fades as time passes)
    const ttlFrac = 1 - (elapsed/TTL_MS);
    const circumference = 2 * Math.PI * 9;
    const dash = circumference * ttlFrac;
    const ttlRing = makeSVG('circle', {
      cx:ax, cy:ay, r:9,
      fill:'none',
      stroke:'#fff',
      'stroke-width':'1',
      'stroke-dasharray':`${dash} ${circumference}`,
      'stroke-dashoffset':'0',
      opacity:'0.4',
      transform:`rotate(-90 ${ax} ${ay})`
    });
    g.appendChild(ttlRing);

    // Interaction
    const hitbox = makeSVG('circle', { cx:ax, cy:ay, r:14, fill:'transparent', cursor:'pointer' });
    hitbox.addEventListener('mouseenter', (e) => showTooltip(agent, ax, ay, elapsed, e));
    hitbox.addEventListener('mouseleave', hideTooltip);
    g.appendChild(hitbox);

    svg.appendChild(g);
  });
}

function showTooltip(agent, ax, ay, elapsed, e) {
  const tt = document.getElementById('agentTooltip');
  const container = document.getElementById('villageContainer');
  const rect = container.getBoundingClientRect();
  const svgEl = document.getElementById('village-svg');
  const vw = svgEl.viewBox.baseVal.width;
  const vh = svgEl.viewBox.baseVal.height;
  const scaleX = rect.width / vw;
  const scaleY = rect.height / vh;
  const px = ax * scaleX + rect.left - container.getBoundingClientRect().left;
  const py = ay * scaleY + rect.top - container.getBoundingClientRect().top;

  const remaining = Math.max(0, TTL_MS - elapsed);
  const mins = Math.floor(remaining/60000);
  const secs = Math.floor((remaining%60000)/1000);

  const lastAction = feedItems.find(f => f.agent_id === agent.id || f.agent_name === agent.name);

  document.getElementById('tt-name').textContent = agent.name.toUpperCase();
  document.getElementById('tt-skill').textContent = `⊕ ${agent.skill}`;
  document.getElementById('tt-action').textContent = lastAction ? `Last: ${lastAction.action_type} — ${lastAction.action?.substring(0,60)||''}...` : 'No actions yet';
  document.getElementById('tt-pts').textContent = `Points: ${agent.points||0}`;
  document.getElementById('tt-ttl').textContent = `⏱ Expires in ${mins}m ${secs}s`;

  tt.style.left = px + 'px';
  tt.style.top = (py - 20) + 'px';
  tt.classList.add('visible');
}

function hideTooltip() {
  document.getElementById('agentTooltip').classList.remove('visible');
}

// ── FEED ─────────────────────────────────────────────────────
function renderFeed() {
  const c = document.getElementById('feedCards');
  const items = feedItems.slice(0, 20);
  c.innerHTML = '';
  if (!items.length) {
    c.innerHTML = '<div style="color:var(--muted);font-size:0.75rem;padding:0.5rem 1rem;">No activity yet. Trigger a tick.</div>';
    return;
  }
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'feed-card';
    const ago = timeAgo(item.created_at);
    card.innerHTML = `
      <div class="feed-card-header">
        <span class="feed-card-name" style="color:${item.color||'var(--text)'}">${item.avatar||'🤖'} ${item.agent_name||'?'}</span>
        <span class="feed-card-badge badge-${item.action_type||'THINK'}">${item.action_type||'?'}</span>
      </div>
      <div class="feed-card-thought">"${(item.thought||'').substring(0,80)}"</div>
      <div class="feed-card-action">${(item.action||'').substring(0,100)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.3rem">
        <span class="feed-card-pts">+${item.points_earned||0} pts</span>
        <span class="feed-card-time">${ago}</span>
      </div>`;
    c.appendChild(card);
  });
}

// ── LEADERBOARD ───────────────────────────────────────────────
function renderLeaderboard() {
  const sorted = [...agents].sort((a,b)=>(b.points||0)-(a.points||0)).slice(0,8);
  const c = document.getElementById('leaderboardList');
  if (!sorted.length) { c.innerHTML = '<div style="color:var(--muted);font-size:0.75rem">No agents deployed</div>'; return; }
  c.innerHTML = sorted.map((a,i) => {
    const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    return `<div class="lb-row">
      <div class="lb-rank ${rankClass}">#${i+1}</div>
      <div class="lb-avatar" style="background:${a.color||'#0d1520'}22;border:1px solid ${a.color||'var(--border)'}">${a.avatar||'🤖'}</div>
      <div class="lb-info"><div class="lb-name">${a.name}</div><div class="lb-skill">${a.skill}</div></div>
      <div class="lb-pts">${a.points||0}</div>
    </div>`;
  }).join('');
}

// ── STATS ─────────────────────────────────────────────────────
function renderStats() {
  const totalPts = feedItems.reduce((s,f)=>s+(f.points_earned||0),0);
  const solved = feedItems.filter(f=>f.action_type==='SOLVE').length;
  document.getElementById('worldStats').innerHTML = `
    <div class="stat-row"><span>Total Actions</span><span class="stat-val">${feedItems.length}</span></div>
    <div class="stat-row"><span>Crisis Solved</span><span class="stat-val">${solved}</span></div>
    <div class="stat-row"><span>Points Awarded</span><span class="stat-val">${totalPts}</span></div>
    <div class="stat-row"><span>Active Agents</span><span class="stat-val">${agents.filter(a=>a.status==='active').length}</span></div>
    <div class="stat-row"><span>World Tick</span><span class="stat-val">#${worldState.tick}</span></div>`;
}

// ── TTL PANEL ─────────────────────────────────────────────────
function renderTTL() {
  const c = document.getElementById('agentTTL');
  const now = Date.now();
  const active = agents.filter(a=>a.status==='active');
  if (!active.length) { c.innerHTML = '<div style="color:var(--muted);font-size:0.75rem">No active agents</div>'; return; }
  c.innerHTML = active.map(a => {
    const deploy = agentDeployTimes[a.id]||now;
    const elapsed = now - deploy;
    const remaining = Math.max(0, TTL_MS - elapsed);
    const frac = remaining / TTL_MS;
    const mins = Math.floor(remaining/60000);
    const secs = Math.floor((remaining%60000)/1000);
    const color = frac > 0.5 ? 'var(--green)' : frac > 0.2 ? 'var(--yellow)' : 'var(--red)';
    return `<div class="ttl-agent">
      <span style="font-size:16px">${a.avatar||'🤖'}</span>
      <div class="ttl-name" style="color:${a.color||'var(--text)'}">${a.name}</div>
      <div class="ttl-bar-wrap"><div class="ttl-bar-fill" style="width:${frac*100}%;background:${color}"></div></div>
      <span class="ttl-text">${mins}m${secs}s</span>
    </div>`;
  }).join('');
}

// ── LOOP ──────────────────────────────────────────────────────
function startLoop() {
  let lastFetch = 0;
  function tick() {
    const now = Date.now();
    renderVillage();     // smooth re-render every frame for orbital movement
    renderTTL();
    if (now - lastFetch > 15000) { // re-fetch every 15s
      lastFetch = now;
      fetchFeed().then(() => { renderStats(); renderLeaderboard(); });
    }
    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}

// ── VIEW SWITCHER ─────────────────────────────────────────────
function switchView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(name+'-view').classList.add('active');
  const btns = { world:0, deploy:1, board:2 };
  document.querySelectorAll('nav button')[btns[name]]?.classList.add('active');
  if (name==='board') {
    renderLeaderboard();
    renderStats();
    renderTTL();
    document.getElementById('boardLastUpdate').textContent = 'Updated '+new Date().toLocaleTimeString();
  }
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, type='info') {
  const area = document.getElementById('toastArea');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  area.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ── UTILS ─────────────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return '—';
  const diff = Date.now() - new Date(ts).getTime();
  if (diff < 60000) return `${Math.floor(diff/1000)}s ago`;
  if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
  return `${Math.floor(diff/3600000)}h ago`;
}
